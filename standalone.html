<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>科研 MBTI</title>
    <style>
      :root {
        --bg: #070b0f;
        --panel: rgba(17, 24, 39, 0.72);
        --panel-border: rgba(255, 255, 255, 0.08);
        --text: #f8fafc;
        --muted: rgba(226, 232, 240, 0.66);
        --dim: rgba(226, 232, 240, 0.4);
        --green: #32f08c;
        --green-soft: rgba(50, 240, 140, 0.16);
        --purple: #a855f7;
        --purple-soft: rgba(168, 85, 247, 0.18);
        --blue: #4cc3ff;
        --yellow: #f8d36b;
        --danger: #ff8b8b;
        --shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
        --radius: 24px;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background:
          radial-gradient(circle at top, rgba(50, 240, 140, 0.15), transparent 28%),
          radial-gradient(circle at 80% 20%, rgba(168, 85, 247, 0.12), transparent 24%),
          linear-gradient(180deg, #06080d 0%, #09111a 100%);
        color: var(--text);
        font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      }

      body {
        position: relative;
        overflow-x: hidden;
      }

      #bg-canvas {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
        opacity: 0.9;
      }

      #app {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        padding: 28px 16px 48px;
      }

      .shell {
        max-width: 760px;
        margin: 0 auto;
      }

      .glass,
      .hero,
      .option,
      .action-btn {
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
      }

      .hero,
      .glass {
        border: 1px solid var(--panel-border);
        border-radius: var(--radius);
        background: var(--panel);
        box-shadow: var(--shadow);
      }

      .hero {
        padding: 36px 28px;
        text-align: center;
      }

      .kicker {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 18px;
        padding: 8px 14px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        color: var(--muted);
        font-size: 13px;
        letter-spacing: 0.06em;
      }

      .dot {
        width: 9px;
        height: 9px;
        border-radius: 999px;
        background: var(--green);
        box-shadow: 0 0 16px rgba(50, 240, 140, 0.8);
      }

      h1,
      h2,
      h3,
      p {
        margin: 0;
      }

      .hero h1,
      .result-code {
        font-family: "Consolas", "SFMono-Regular", monospace;
        letter-spacing: 0.04em;
      }

      .hero h1 {
        font-size: clamp(42px, 8vw, 72px);
        line-height: 0.98;
        margin-bottom: 18px;
      }

      .neon-green {
        color: var(--green);
        text-shadow: 0 0 20px rgba(50, 240, 140, 0.35);
      }

      .neon-purple {
        color: #d4a7ff;
        text-shadow: 0 0 20px rgba(168, 85, 247, 0.35);
      }

      .subtitle {
        max-width: 560px;
        margin: 0 auto;
        color: var(--muted);
        font-size: 18px;
        line-height: 1.7;
      }

      .tiny {
        color: var(--dim);
        font-size: 13px;
        line-height: 1.7;
      }

      .cta-row,
      .stack {
        display: grid;
        gap: 14px;
      }

      .cta-row {
        max-width: 360px;
        margin: 28px auto 0;
      }

      .primary-btn,
      .secondary-btn,
      .ghost-btn,
      .option,
      .mini-btn,
      .chip {
        width: 100%;
        border: 0;
        cursor: pointer;
        transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease, border-color 0.18s ease, color 0.18s ease, opacity 0.18s ease;
      }

      .primary-btn,
      .secondary-btn,
      .ghost-btn,
      .mini-btn {
        padding: 14px 18px;
        border-radius: 18px;
        font-size: 16px;
        font-weight: 700;
      }

      .primary-btn {
        color: #06110b;
        background: linear-gradient(135deg, #42ff9c 0%, #2fd77d 100%);
        box-shadow: 0 14px 30px rgba(50, 240, 140, 0.24);
      }

      .primary-btn:hover,
      .secondary-btn:hover,
      .ghost-btn:hover,
      .mini-btn:hover,
      .option:hover,
      .chip:hover {
        transform: translateY(-1px);
      }

      .secondary-btn {
        color: var(--text);
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.12);
      }

      .ghost-btn,
      .mini-btn {
        color: var(--muted);
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      .page-head {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 22px;
      }

      .page-head .back {
        width: auto;
        padding: 10px 14px;
        border-radius: 14px;
      }

      .progress-shell {
        flex: 1;
      }

      .progress-row {
        display: flex;
        align-items: center;
        gap: 16px;
        margin-bottom: 8px;
      }

      .progress-bar {
        position: relative;
        height: 8px;
        border-radius: 999px;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.08);
      }

      .progress-fill {
        position: absolute;
        inset: 0 auto 0 0;
        border-radius: inherit;
        background: linear-gradient(90deg, #2fd77d 0%, #67d2ff 100%);
      }

      .page-label {
        min-width: 72px;
        text-align: right;
        color: var(--dim);
        font-family: "Consolas", monospace;
        font-size: 13px;
      }

      .card-title {
        font-size: 13px;
        color: var(--dim);
        margin-bottom: 12px;
        letter-spacing: 0.08em;
      }

      .question-card,
      .section-card {
        padding: 22px 20px;
      }

      .question-card h2 {
        font-size: clamp(24px, 4vw, 32px);
        line-height: 1.45;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        padding: 5px 10px;
        border-radius: 999px;
        font-size: 12px;
        color: #e9d5ff;
        background: var(--purple-soft);
        margin-bottom: 12px;
      }

      .option-list,
      .result-actions,
      .detail-grid,
      .mbti-groups {
        display: grid;
        gap: 14px;
      }

      .option {
        text-align: left;
        padding: 18px;
        border-radius: 20px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.04);
        color: var(--text);
      }

      .option.selected {
        border-color: rgba(50, 240, 140, 0.55);
        background: rgba(50, 240, 140, 0.12);
        box-shadow: 0 0 0 1px rgba(50, 240, 140, 0.18);
      }

      .option-letter {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 32px;
        height: 32px;
        border-radius: 999px;
        margin-right: 14px;
        font-family: "Consolas", monospace;
        background: rgba(255, 255, 255, 0.08);
        color: var(--muted);
        flex-shrink: 0;
      }

      .option.selected .option-letter {
        background: var(--green);
        color: #07100b;
      }

      .option-row {
        display: flex;
        align-items: center;
      }

      .helper {
        margin-top: 16px;
        text-align: center;
        color: var(--dim);
        font-size: 13px;
      }

      .group-card {
        padding: 18px;
      }

      .group-options {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .chip {
        padding: 14px;
        border-radius: 16px;
        color: var(--muted);
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.08);
        font-family: "Consolas", monospace;
        font-size: 18px;
        font-weight: 700;
      }

      .chip.selected {
        color: #07100b;
        background: var(--green);
        box-shadow: 0 10px 24px rgba(50, 240, 140, 0.22);
      }

      .all-types {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .preview-code {
        margin: 4px 0 20px;
        text-align: center;
        font-size: 30px;
        font-family: "Consolas", monospace;
        color: #d4a7ff;
      }

      .result-head {
        text-align: center;
        padding: 10px 0 6px;
      }

      .result-code {
        font-size: clamp(48px, 10vw, 76px);
        margin: 8px 0 6px;
        color: var(--green);
        text-shadow: 0 0 24px rgba(50, 240, 140, 0.28);
      }

      .result-name {
        font-size: clamp(28px, 5vw, 38px);
        font-weight: 800;
        margin-bottom: 8px;
      }

      .result-subtitle {
        color: var(--muted);
        font-style: italic;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        margin-top: 14px;
        border-radius: 999px;
        background: var(--purple-soft);
        color: #f3e8ff;
        font-size: 13px;
      }

      .section-card h3 {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 14px;
        font-size: 17px;
      }

      .icon {
        width: 28px;
        height: 28px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 999px;
        font-size: 14px;
      }

      .icon.green {
        background: var(--green-soft);
      }

      .icon.yellow {
        background: rgba(248, 211, 107, 0.14);
      }

      .icon.blue {
        background: rgba(76, 195, 255, 0.15);
      }

      .list {
        display: grid;
        gap: 10px;
        padding: 0;
        margin: 0;
        list-style: none;
      }

      .list li {
        display: flex;
        gap: 10px;
        color: var(--muted);
        line-height: 1.65;
      }

      .bullet {
        color: var(--green);
        flex-shrink: 0;
      }

      .compare-row {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        gap: 12px;
        align-items: center;
        margin-bottom: 18px;
      }

      .compare-box {
        padding: 16px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.08);
        text-align: center;
      }

      .compare-label {
        color: var(--dim);
        font-size: 12px;
        margin-bottom: 8px;
      }

      .compare-type {
        font-family: "Consolas", monospace;
        font-size: 28px;
        font-weight: 800;
      }

      .compare-type.research {
        color: var(--green);
      }

      .compare-tag {
        margin-top: 6px;
        color: var(--dim);
        font-size: 13px;
      }

      .diffs {
        display: grid;
        gap: 10px;
        margin-top: 18px;
      }

      .diff-item {
        padding-left: 14px;
        border-left: 3px solid rgba(168, 85, 247, 0.45);
        color: var(--muted);
        line-height: 1.65;
      }

      .match-meta {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 10px;
        color: var(--dim);
        font-size: 13px;
      }

      .center-note {
        margin-top: 14px;
        text-align: center;
        color: var(--dim);
        font-size: 13px;
        line-height: 1.7;
      }

      .footer-note {
        text-align: center;
        margin-top: 18px;
        color: rgba(226, 232, 240, 0.28);
        font-size: 12px;
      }

      .spacer-hero {
        margin-top: 14px;
      }

      .hidden {
        display: none !important;
      }

      @media (max-width: 640px) {
        #app {
          padding-top: 20px;
        }

        .hero,
        .glass {
          border-radius: 22px;
        }

        .hero {
          padding: 28px 18px;
        }

        .question-card,
        .section-card,
        .group-card {
          padding: 18px 16px;
        }

        .compare-row {
          grid-template-columns: 1fr;
        }

        .all-types {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }
    </style>
  </head>
  <body>
    <canvas id="bg-canvas"></canvas>
    <div id="app"></div>
    <script>
      const questions = [
        { id: 1, text: "导师突然抛出一个新选题，你第一反应是？", options: [{ text: "回去自己先想三天", score: "L" }, { text: "立刻找人 brainstorm", score: "C" }] },
        { id: 2, text: "代码或实验卡住时，你更可能？", options: [{ text: "深夜独自搜索解决方案", score: "L" }, { text: "直接在群里发截图求救", score: "C" }] },
        { id: 3, text: "写论文时你需要？", options: [{ text: "关掉消息，进入孤岛模式", score: "L" }, { text: "开共享文档，边聊边改", score: "C" }] },
        { id: 4, text: "你的好点子通常来自？", options: [{ text: "散步、洗澡、发呆", score: "L" }, { text: "聊天、组会、被人质疑", score: "C" }] },
        { id: 5, text: "看到合作者改了你的段落，你会？", options: [{ text: "先沉默消化半小时", score: "L" }, { text: "马上连麦开始解释", score: "C" }] },
        { id: 6, text: "科研压力大时，你通常？", options: [{ text: "隐身，自己慢慢修复", score: "L" }, { text: "找同门吐槽恢复血量", score: "C" }] },
        { id: 7, text: "你更喜欢哪种选题？", options: [{ text: "没什么人做过的新问题", score: "N" }, { text: "前人做过但还能推进的问题", score: "A" }] },
        { id: 8, text: "看到一个冷门现象，你会？", options: [{ text: "想给它起一个新概念", score: "N" }, { text: "先查有没有前人定义过", score: "A" }] },
        { id: 9, text: "开题时你更想强调？", options: [{ text: "这个问题为什么新", score: "N" }, { text: "这个问题如何接续已有研究", score: "A" }] },
        { id: 10, text: "读文献时你最兴奋的是？", options: [{ text: "发现一个没人填的坑", score: "N" }, { text: "看清一个领域的演化脉络", score: "A" }] },
        { id: 11, text: "被问'创新点在哪'时，你会？", options: [{ text: "激动描述未来可能性", score: "N" }, { text: "严谨解释和前人的差异", score: "A" }] },
        { id: 12, text: "你理想中的论文贡献是？", options: [{ text: "开辟一个新方向", score: "N" }, { text: "把一个老问题讲清楚", score: "A" }] },
        { id: 13, text: "遇到新问题，你通常先？", options: [{ text: "画框架、列变量、想机制", score: "M" }, { text: "先跑个 demo 或 pilot", score: "X" }] },
        { id: 14, text: "方法不稳定时，你倾向于？", options: [{ text: "回到理论逻辑重新推", score: "M" }, { text: "改参数、换数据、继续试", score: "X" }] },
        { id: 15, text: "开始实验或写代码前，你需要？", options: [{ text: "一个相对完整的方案", score: "M" }, { text: "一个能跑起来的最小版本", score: "X" }] },
        { id: 16, text: "Reviewer 质疑你时，你更想补？", options: [{ text: "理论解释和逻辑链", score: "M" }, { text: "实验结果和对比图", score: "X" }] },
        { id: 17, text: "哪种结果更让你安心？", options: [{ text: "机制解释闭环", score: "M" }, { text: "曲线明显变好", score: "X" }] },
        { id: 18, text: "学一个新工具时，你会？", options: [{ text: "先看文档和原理", score: "M" }, { text: "直接复制 demo 改起来", score: "X" }] },
        { id: 19, text: "距离 deadline 还有一个月，你会？", options: [{ text: "排时间表，拆任务", score: "O" }, { text: "先让灵感自然发酵", score: "B" }] },
        { id: 20, text: "写论文时，你更常？", options: [{ text: "边做边整理材料", score: "O" }, { text: "最后统一考古所有文件", score: "B" }] },
        { id: 21, text: "你的文件命名更像？", options: [{ text: "fig3_final_clean_v1", score: "O" }, { text: "final_final_really_final2", score: "B" }] },
        { id: 22, text: "周末科研安排通常是？", options: [{ text: "有固定进度", score: "O" }, { text: "看危机程度决定", score: "B" }] },
        { id: 23, text: "数据和图表你会？", options: [{ text: "边跑边归档", score: "O" }, { text: "投稿前疯狂抢救", score: "B" }] },
        { id: 24, text: "合作任务快到期时，你会？", options: [{ text: "提前提醒大家", score: "O" }, { text: "最后一天爆发神迹", score: "B" }] },
        { id: 25, text: "你最近的科研精神状态最接近？", special: true, options: [{ text: "我觉得还能再改一点", score: "A" }, { text: "先交了再说", score: "B" }, { text: "我想开个新坑", score: "C" }, { text: "谁来救救我的代码 / 实验", score: "D" }] }
      ];

      const easterEggLabels = {
        A: "永恒修改鬼",
        B: "投稿冲锋兵",
        C: "开坑异能者",
        D: "Debug 受害者"
      };

      const personas = {

        "F→M": "生活里你重视感受，科研里你冷静搭模型。你把温柔留给人类，把严谨留给论文。",
        "T→M": "你是逻辑闭环爱好者，没有机制解释的结果在你眼里都像玄学。",
        "F→X": "你相信反馈、现象和真实反应。先让结果说话，再让理论补票。",
        "J→B": "生活中你想规划，科研中你被 deadline 夺舍。不是你不自律，是论文太会拖。",
        "P→O": "生活里你随缘，科研里却开始建表。说明你不是不会规划，你只是需要足够恐惧。",
        "J→O": "你是时间线守护者，连 figure 命名都透露着秩序之光。",
        "P→B": "你和 deadline 是宿命伴侣。不到最后一刻，你的科研人格不会完全加载。"
      };

      const STORAGE_KEY = "research_mbti_standalone_state";
      const LEGACY_STORAGE_KEY = "research_mbti_state";
      const allMBTIs = ["INTJ", "INTP", "ENTJ", "ENTP", "INFJ", "INFP", "ENFJ", "ENFP", "ISTJ", "ISFJ", "ESTJ", "ESFJ", "ISTP", "ISFP", "ESTP", "ESFP"];
      const dimGroups = [
        { key: "EI", label: "能量来源", options: ["I", "E"] },
        { key: "NS", label: "信息获取", options: ["N", "S"] },
        { key: "TF", label: "决策方式", options: ["T", "F"] },
        { key: "JP", label: "生活方式", options: ["J", "P"] }
      ];

      function createDefaultState() {
        return {
          step: "home",
          currentQuestion: 0,
          answers: {},
          researchType: "",
          easterEgg: "",
          realMBTI: "",
          matchCount: 0,
          matchLevel: "",
          dimDiffs: [],
          showAllMBTI: false,
          mbtiSelection: { EI: "", NS: "", TF: "", JP: "" }
        };
      }

      function loadState() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (raw) return { ...createDefaultState(), ...JSON.parse(raw) };
          const legacy = localStorage.getItem(LEGACY_STORAGE_KEY);
          if (legacy) {
            const parsed = JSON.parse(legacy);
            return {
              ...createDefaultState(),
              step: parsed.currentStep === "mbti-input" ? "mbti" : parsed.currentStep || "home",
              currentQuestion: parsed.currentQuestion || 0,
              answers: parsed.answers || {},
              researchType: parsed.researchType || "",
              easterEgg: parsed.easterEgg || "",
              realMBTI: parsed.realMBTI || "",
              matchCount: parsed.matchCount || 0,
              matchLevel: parsed.matchLevel || "",
              dimDiffs: parsed.dimDiffs || []
            };
          }
        } catch (error) {
          console.warn("loadState failed", error);
        }
        return createDefaultState();
      }

      let state = loadState();
      const app = document.getElementById("app");

      function saveState() {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        } catch (error) {
          console.warn("saveState failed", error);
        }
      }

      function clearState() {
        state = createDefaultState();
        try {
          localStorage.removeItem(STORAGE_KEY);
        } catch (error) {
          console.warn("clearState failed", error);
        }
      }

      function getProjectedResearchType(mbti) {
        if (!mbti || mbti.length !== 4) return "";
        return mbti.split("").map((char) => dimMap[char] || "").join("");
      }

      function getMatchCount(researchType, projectedType) {
        let count = 0;
        for (let i = 0; i < 4; i += 1) {
          if (researchType[i] === projectedType[i]) count += 1;
        }
        return count;
      }

      function getDimDiffText(realMBTI, researchType) {
        const diffs = [];
        const realDims = realMBTI.split("");
        for (let i = 0; i < 4; i += 1) {
          const realDim = realDims[i];
          const projectedDim = dimMap[realDim];
          const researchDim = researchType[i];
          if (projectedDim !== researchDim) {
            const key = `${realDim}→${researchDim}`;
            if (dimDiffTexts[key]) diffs.push(dimDiffTexts[key]);
          }
        }
        return diffs;
      }

      function calculateResearchResult() {
        const scores = { L: 0, C: 0, N: 0, A: 0, M: 0, X: 0, O: 0, B: 0 };
        for (let i = 1; i <= 24; i += 1) {
          const answer = state.answers[i];
          if (answer && scores[answer] !== undefined) scores[answer] += 1;
        }

        const dim1 = scores.L >= scores.C ? "L" : "C";
        const dim2 = scores.N >= scores.A ? "N" : "A";
        const dim3 = scores.M >= scores.X ? "M" : "X";
        const dim4 = scores.O >= scores.B ? "O" : "B";
        state.researchType = `${dim1}${dim2}${dim3}${dim4}`;
        state.easterEgg = state.answers[25] ? easterEggLabels[state.answers[25]] || "" : "";
      }

      function updateMBTIResult(mbti) {
        state.realMBTI = mbti;
        if (!mbti) {
          state.matchCount = 0;
          state.matchLevel = "";
          state.dimDiffs = [];
          return;
        }
        const projected = getProjectedResearchType(mbti);
        const matchCount = getMatchCount(state.researchType, projected);
        state.matchCount = matchCount;
        state.matchLevel = matchLevels[matchCount];
        state.dimDiffs = getDimDiffText(mbti, state.researchType);
      }

      function getCurrentMBTI() {
        const { EI, NS, TF, JP } = state.mbtiSelection;
        return `${EI || ""}${NS || ""}${TF || ""}${JP || ""}`;
      }

      function html(strings, ...values) {
        return strings.reduce((acc, cur, index) => acc + cur + (values[index] ?? ""), "");
      }

      function renderHome() {
        const progressCount = Object.keys(state.answers || {}).length;
        const hasProgress = progressCount > 0 && (state.step !== "home" || state.currentQuestion > 0);
        return html`
          <div class="shell">
            <section class="hero">
              <div class="kicker"><span class="dot"></span>娱乐向科研人格测试</div>
              <h1><span class="neon-green">测测你的</span><br /><span class="neon-purple">科研 MBTI</span></h1>
              <p class="subtitle">看看你的论文灵魂是 <span class="neon-green">月球基地总设计师</span>，还是 <span class="neon-purple">群聊爆改火箭队长</span>。</p>
              <div class="cta-row">
                <button class="primary-btn" data-action="start-test">${hasProgress ? "继续测试" : "开始测试"}</button>
                ${hasProgress ? `<button class="ghost-btn" data-action="restart-test">重新开始</button>` : ""}
              </div>
              <p class="tiny spacer-hero">约 25 题 · 约 3 分钟 · 完全免费</p>
              ${hasProgress ? `<p class="tiny spacer-hero">已保存进度：${progressCount} / ${questions.length} 题</p>` : ""}
              <p class="tiny spacer-hero">本测试仅用于科研娱乐与自我调侃，不构成心理学诊断，也不建议作为导师选择、转博决策或退学申请依据。</p>
            </section>
          </div>
        `;
      }

      function renderTest() {
        const question = questions[state.currentQuestion];
        const selected = state.answers[question.id];
        const total = questions.length;
        const progress = ((state.currentQuestion + 1) / total) * 100;
        return html`
          <div class="shell">
            <div class="page-head">
              <button class="ghost-btn back" data-action="test-back">${state.currentQuestion === 0 ? "返回" : "上一题"}</button>
              <div class="progress-shell">
                <div class="progress-row">
                  <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
                  <div class="page-label">${state.currentQuestion + 1} / ${total}</div>
                </div>
              </div>
            </div>
            <section class="glass question-card">
              ${question.special ? `<div class="badge">彩蛋题</div>` : ""}
              <div class="card-title">${question.special ? "不计入主维度，但会生成你的科研状态标签" : "请选择更像你的那个选项"}</div>
              <h2>${question.text}</h2>
            </section>
            <div class="option-list" style="margin-top:16px;">
              ${question.options.map((option, index) => {
                const letter = question.special ? ["A", "B", "C", "D"][index] : ["A", "B"][index];
                return `
                  <button class="option ${selected === option.score ? "selected" : ""}" data-action="select-option" data-score="${option.score}">
                    <span class="option-row">
                      <span class="option-letter">${letter}</span>
                      <span>${option.text}</span>
                    </span>
                  </button>
                `;
              }).join("")}
            </div>
            <p class="helper">${selected ? "已记录本题答案，再点其他选项也可以改。" : "点击选项后会自动进入下一题。"}</p>
          </div>
        `;
      }

      function renderMBTI() {
        const currentMBTI = getCurrentMBTI();
        const currentTag = mbtiTags[currentMBTI] || "";
        return html`
          <div class="shell">
            <div class="page-head">
              <button class="ghost-btn back" data-action="back-to-test">返回上一页</button>
            </div>
            <section class="glass section-card">
              <div class="card-title">额外对照</div>
              <h2 style="font-size:30px;margin-bottom:10px;">你愿意输入真实 MBTI 吗？</h2>
              <p class="tiny">看看生活人格和科研人格打起来了吗。你也可以直接跳过，只看科研 MBTI 结果。</p>
            </section>
            <div class="mbti-groups" style="margin-top:16px;">
              ${dimGroups.map((group) => `
                <section class="glass group-card">
                  <div class="card-title">${group.label}</div>
                  <div class="group-options">
                    ${group.options.map((option) => `
                      <button class="chip ${state.mbtiSelection[group.key] === option ? "selected" : ""}" data-action="pick-dim" data-group="${group.key}" data-value="${option}">
                        ${option}
                      </button>
                    `).join("")}
                  </div>
                </section>
              `).join("")}
            </div>
            ${currentMBTI ? `<div class="preview-code">${currentMBTI}${currentTag ? ` <span style="font-size:16px;color:var(--dim);font-family:inherit;">${currentTag}</span>` : ""}</div>` : ""}
            <div class="stack">
              <button class="primary-btn" data-action="confirm-mbti" ${currentMBTI.length === 4 ? "" : "disabled"} style="${currentMBTI.length === 4 ? "" : "opacity:.48;cursor:not-allowed;"}">生成完整报告</button>
              <button class="secondary-btn" data-action="toggle-mbti-list">${state.showAllMBTI ? "收起 16 型列表" : "直接选择我的 16 型 MBTI"}</button>
              ${state.showAllMBTI ? `
                <div class="detail-grid all-types">
                  ${allMBTIs.map((type) => `
                    <button class="chip ${currentMBTI === type ? "selected" : ""}" data-action="pick-full-mbti" data-mbti="${type}" style="font-size:15px;">
                      ${type}
                    </button>
                  `).join("")}
                </div>
              ` : ""}
              <button class="ghost-btn" data-action="skip-mbti">我不知道 / 跳过，只生成科研 MBTI</button>
            </div>
          </div>
        `;
      }

      function renderList(items, color) {
        return `<ul class="list">${items.map((item) => `<li><span class="bullet" style="color:${color};">▸</span><span>${item}</span></li>`).join("")}</ul>`;
      }

      function renderResult() {
        const persona = personas[state.researchType];
        if (!persona) {
          state.step = "home";
          saveState();
          return renderHome();
        }
        const mbtiTag = state.realMBTI ? mbtiTags[state.realMBTI] || "" : "";
        return html`
          <div class="shell">
            <section class="result-head">
              <div class="card-title">你的科研 MBTI 是</div>
              <div class="result-code">${state.researchType}</div>
              <div class="result-name">${persona.name}</div>
              <p class="result-subtitle">"${persona.subtitle}"</p>
              ${state.easterEgg ? `<div class="pill">🎯 ${state.easterEgg}</div>` : ""}
            </section>

            <section class="glass section-card">
              <div class="card-title">核心描述</div>
              <p class="subtitle" style="max-width:none;text-align:left;font-size:16px;color:var(--muted);">${persona.description}</p>
            </section>

            <div class="detail-grid" style="margin-top:16px;">
              <section class="glass section-card">
                <h3><span class="icon green">⚡</span>科研超能力</h3>
                ${renderList(persona.superpowers, "var(--green)")}
              </section>
              <section class="glass section-card">
                <h3><span class="icon yellow">⚠</span>科研副作用</h3>
                ${renderList(persona.risks, "var(--yellow)")}
              </section>
              <section class="glass section-card">
                <h3><span class="icon blue">💡</span>生存建议</h3>
                ${renderList(persona.advice, "var(--blue)")}
              </section>
            </div>

            ${state.realMBTI ? `
              <section class="glass section-card" style="margin-top:16px;">
                <h3><span class="icon" style="background:var(--purple-soft);">🧬</span>生活人格 vs 科研人格</h3>
                <div class="compare-row">
                  <div class="compare-box">
                    <div class="compare-label">真实 MBTI</div>
                    <div class="compare-type">${state.realMBTI}</div>
                    <div class="compare-tag">${mbtiTag}</div>
                  </div>
                  <div style="text-align:center;color:var(--dim);font-size:28px;">→</div>
                  <div class="compare-box">
                    <div class="compare-label">科研 MBTI</div>
                    <div class="compare-type research">${state.researchType}</div>
                    <div class="compare-tag">${persona.name}</div>
                  </div>
                </div>
                <div class="match-meta">
                  <span>一致度</span>
                  <span>${state.matchLevel}</span>
                </div>
                <div class="progress-bar"><div class="progress-fill" style="width:${(state.matchCount / 4) * 100}%"></div></div>
                <div class="center-note">${state.matchCount} / 4 维度匹配</div>
                ${state.dimDiffs.length ? `<div class="diffs">${state.dimDiffs.map((item) => `<div class="diff-item">${item}</div>`).join("")}</div>` : ""}
                ${state.matchCount < 4 ? `<p class="center-note">${state.matchCount <= 1 ? `你把 ${state.realMBTI} 留给了生活，把科研人格交给了 deadline 和组会。` : "你的人生和科研大体一致，但科研总有一些意外让事情变得有趣。"}</p>` : ""}
              </section>
            ` : ""}

            <div class="result-actions" style="margin-top:18px;">
              <button class="secondary-btn" data-action="copy-result">复制结果文案</button>
              <button class="secondary-btn" data-action="download-poster">下载科研人格海报</button>
              <button class="ghost-btn" data-action="retake">再测一次</button>
            </div>

            <p class="footer-note">仅供科研娱乐，不建议作为退学依据。</p>
          </div>
        `;
      }

      function buildResultCopy() {
        const persona = personas[state.researchType];
        if (!persona) return "";
        const parts = [
          `🔬 我的科研 MBTI 是：${state.researchType} ${persona.name}`,
          `"${persona.subtitle}"`,
          "",
          "💡 科研超能力：",
          ...persona.superpowers.map((item) => `• ${item}`),
          "",
          "⚠️ 科研副作用：",
          ...persona.risks.map((item) => `• ${item}`),
          "",
          "🧭 生存建议：",
          ...persona.advice.map((item) => `• ${item}`),
          ""
        ];
        if (state.realMBTI) {
          parts.push(`🧬 真实 MBTI：${state.realMBTI} ${mbtiTags[state.realMBTI] || ""}`);
          parts.push(`一致度：${state.matchCount}/4 ${state.matchLevel}`);
          parts.push("");
        }
        if (state.easterEgg) {
          parts.push(`🎯 当前科研状态：${state.easterEgg}`);
          parts.push("");
        }
        parts.push("来测测你的科研 MBTI 吧。");
        return parts.join("\n");
      }

      async function copyResult() {
        const text = buildResultCopy();
        try {
          await navigator.clipboard.writeText(text);
          alert("结果文案已复制到剪贴板。");
        } catch (error) {
          const textarea = document.createElement("textarea");
          textarea.value = text;
          document.body.appendChild(textarea);
          textarea.select();
          document.execCommand("copy");
          textarea.remove();
          alert("结果文案已复制到剪贴板。");
        }
      }

      function wrapText(ctx, text, maxWidth) {
        const words = text.split("");
        const lines = [];
        let current = "";
        words.forEach((char) => {
          const next = current + char;
          if (ctx.measureText(next).width > maxWidth && current) {
            lines.push(current);
            current = char;
          } else {
            current = next;
          }
        });
        if (current) lines.push(current);
        return lines;
      }

      function addPosterSection(ctx, lines, title, content, width) {
        lines.push({ kind: "space", h: 18 });
        lines.push({ kind: "title", text: title });
        if (Array.isArray(content)) {
          content.forEach((item) => {
            wrapText(ctx, `• ${item}`, width).forEach((line) => lines.push({ kind: "line", text: line }));
          });
        } else {
          wrapText(ctx, content, width).forEach((line) => lines.push({ kind: "line", text: line }));
        }
      }

      function downloadPoster() {
        const persona = personas[state.researchType];
        if (!persona) return;

        const width = 1080;
        const padding = 72;
        const contentWidth = width - padding * 2;
        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d");
        ctx.font = "28px 'Segoe UI'";

        const lines = [
          { kind: "code", text: state.researchType },
          { kind: "name", text: persona.name },
          { kind: "subtitle", text: `"${persona.subtitle}"` },
          { kind: "space", h: 28 }
        ];

        addPosterSection(ctx, lines, "核心描述", persona.description, contentWidth);
        addPosterSection(ctx, lines, "科研超能力", persona.superpowers, contentWidth);
        addPosterSection(ctx, lines, "科研副作用", persona.risks, contentWidth);
        addPosterSection(ctx, lines, "生存建议", persona.advice, contentWidth);

        if (state.realMBTI) {
          addPosterSection(ctx, lines, "MBTI 对照", [`真实 MBTI：${state.realMBTI} ${mbtiTags[state.realMBTI] || ""}`, `一致度：${state.matchCount}/4 ${state.matchLevel}`, ...state.dimDiffs], contentWidth);
        }

        if (state.easterEgg) {
          addPosterSection(ctx, lines, "科研状态标签", state.easterEgg, contentWidth);
        }

        lines.push({ kind: "space", h: 24 });
        lines.push({ kind: "foot", text: "Made for researchers who procrastinate." });

        let height = 160;
        lines.forEach((line) => {
          if (line.kind === "space") height += line.h;
          else if (line.kind === "code") height += 90;
          else if (line.kind === "name") height += 58;
          else if (line.kind === "subtitle") height += 42;
          else if (line.kind === "title") height += 44;
          else if (line.kind === "foot") height += 36;
          else height += 34;
        });
        height += padding;

        canvas.width = width;
        canvas.height = height;

        const gradient = ctx.createLinearGradient(0, 0, width, height);
        gradient.addColorStop(0, "#061019");
        gradient.addColorStop(0.5, "#091823");
        gradient.addColorStop(1, "#05090f");
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, width, height);

        ctx.fillStyle = "rgba(50,240,140,0.12)";
        ctx.beginPath();
        ctx.arc(160, 150, 120, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "rgba(168,85,247,0.10)";
        ctx.beginPath();
        ctx.arc(width - 120, 170, 140, 0, Math.PI * 2);
        ctx.fill();

        let y = padding + 16;
        lines.forEach((line) => {
          switch (line.kind) {
            case "space":
              y += line.h;
              break;
            case "code":
              ctx.fillStyle = "#32f08c";
              ctx.font = "bold 72px Consolas, monospace";
              ctx.fillText(line.text, padding, y);
              y += 90;
              break;
            case "name":
              ctx.fillStyle = "#ffffff";
              ctx.font = "bold 46px 'Segoe UI'";
              ctx.fillText(line.text, padding, y);
              y += 58;
              break;
            case "subtitle":
              ctx.fillStyle = "rgba(226,232,240,0.78)";
              ctx.font = "italic 26px 'Segoe UI'";
              ctx.fillText(line.text, padding, y);
              y += 42;
              break;
            case "title":
              ctx.fillStyle = "#d4a7ff";
              ctx.font = "bold 28px 'Segoe UI'";
              ctx.fillText(line.text, padding, y);
              y += 44;
              break;
            case "foot":
              ctx.fillStyle = "rgba(226,232,240,0.55)";
              ctx.font = "20px 'Segoe UI'";
              ctx.fillText(line.text, padding, y);
              y += 36;
              break;
            default:
              ctx.fillStyle = "rgba(248,250,252,0.88)";
              ctx.font = "24px 'Segoe UI'";
              ctx.fillText(line.text, padding, y);
              y += 34;
          }
        });

        const link = document.createElement("a");
        link.href = canvas.toDataURL("image/png");
        link.download = `科研MBTI_${state.researchType}.png`;
        link.click();
      }

      function bindEvents() {
        app.querySelectorAll("[data-action]").forEach((element) => {
          element.addEventListener("click", (event) => {
            const target = event.currentTarget;
            const action = target.dataset.action;

            if (action === "start-test") {
              if (Object.keys(state.answers).length === 0) {
                state.currentQuestion = 0;
                state.answers = {};
              }
              state.step = "test";
              saveState();
              render();
            }

            if (action === "restart-test") {
              clearState();
              state.step = "test";
              saveState();
              render();
            }

            if (action === "test-back") {
              if (state.currentQuestion === 0) {
                state.step = "home";
              } else {
                state.currentQuestion -= 1;
              }
              saveState();
              render();
            }

            if (action === "select-option") {
              const score = target.dataset.score;
              const question = questions[state.currentQuestion];
              state.answers[question.id] = score;
              saveState();
              render();
              setTimeout(() => {
                if (state.currentQuestion < questions.length - 1) {
                  state.currentQuestion += 1;
                  saveState();
                  render();
                } else {
                  calculateResearchResult();
                  state.step = "mbti";
                  saveState();
                  render();
                }
              }, 220);
            }

            if (action === "back-to-test") {
              state.step = "test";
              state.currentQuestion = questions.length - 1;
              saveState();
              render();
            }

            if (action === "pick-dim") {
              const { group, value } = target.dataset;
              state.mbtiSelection[group] = value;
              saveState();
              render();
            }

            if (action === "toggle-mbti-list") {
              state.showAllMBTI = !state.showAllMBTI;
              saveState();
              render();
            }

            if (action === "pick-full-mbti") {
              const mbti = target.dataset.mbti;
              state.mbtiSelection = { EI: mbti[0], NS: mbti[1], TF: mbti[2], JP: mbti[3] };
              saveState();
              render();
            }

            if (action === "confirm-mbti") {
              const currentMBTI = getCurrentMBTI();
              if (currentMBTI.length !== 4) return;
              updateMBTIResult(currentMBTI);
              state.step = "result";
              saveState();
              render();
            }

            if (action === "skip-mbti") {
              updateMBTIResult("");
              state.step = "result";
              saveState();
              render();
            }

            if (action === "copy-result") {
              copyResult();
            }

            if (action === "download-poster") {
              downloadPoster();
            }

            if (action === "retake") {
              clearState();
              render();
            }
          });
        });
      }

      function render() {
        if (state.step === "test" && state.currentQuestion >= questions.length) {
          state.currentQuestion = questions.length - 1;
        }
        if (state.step === "mbti" && !state.researchType) calculateResearchResult();
        let view = "";
        if (state.step === "test") view = renderTest();
        else if (state.step === "mbti") view = renderMBTI();
        else if (state.step === "result") view = renderResult();
        else view = renderHome();
        app.innerHTML = view;
        bindEvents();
      }

      function initBackground() {
        const canvas = document.getElementById("bg-canvas");
        const ctx = canvas.getContext("2d");
        const emojis = ["🧪", "🔬", "📄", "☕", "💻", "📊", "🧬", "⚗️"];
        let particles = [];
        let floating = [];

        function resize() {
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
          particles = Array.from({ length: Math.min(70, Math.floor((canvas.width * canvas.height) / 15000)) }, () => ({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            vx: (Math.random() - 0.5) * 0.3,
            vy: (Math.random() - 0.5) * 0.3,
            size: Math.random() * 2 + 0.6,
            opacity: Math.random() * 0.5 + 0.08
          }));
          floating = Array.from({ length: 6 }, () => ({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            icon: emojis[Math.floor(Math.random() * emojis.length)],
            speed: Math.random() * 0.2 + 0.08,
            size: Math.random() * 18 + 16,
            opacity: Math.random() * 0.14 + 0.04
          }));
        }

        function draw() {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          ctx.strokeStyle = "rgba(255,255,255,0.028)";
          ctx.lineWidth = 0.5;
          for (let x = 0; x < canvas.width; x += 64) {
            ctx.beginPath();
            ctx.moveTo(x, 0);
            ctx.lineTo(x, canvas.height);
            ctx.stroke();
          }
          for (let y = 0; y < canvas.height; y += 64) {
            ctx.beginPath();
            ctx.moveTo(0, y);
            ctx.lineTo(canvas.width, y);
            ctx.stroke();
          }

          ctx.strokeStyle = "rgba(50,240,140,0.05)";
          particles.forEach((particle, index) => {
            for (let j = index + 1; j < particles.length; j += 1) {
              const other = particles[j];
              const dx = particle.x - other.x;
              const dy = particle.y - other.y;
              const dist = Math.sqrt(dx * dx + dy * dy);
              if (dist < 120) {
                ctx.beginPath();
                ctx.moveTo(particle.x, particle.y);
                ctx.lineTo(other.x, other.y);
                ctx.stroke();
              }
            }
          });

          particles.forEach((particle) => {
            ctx.beginPath();
            ctx.arc(particle.x, particle.y, particle.size, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(50,240,140,${particle.opacity})`;
            ctx.fill();
            particle.x += particle.vx;
            particle.y += particle.vy;
            if (particle.x < 0 || particle.x > canvas.width) particle.vx *= -1;
            if (particle.y < 0 || particle.y > canvas.height) particle.vy *= -1;
          });

          floating.forEach((item) => {
            ctx.font = `${item.size}px serif`;
            ctx.fillStyle = `rgba(255,255,255,${item.opacity})`;
            ctx.fillText(item.icon, item.x, item.y);
            item.y -= item.speed;
            if (item.y < -40) {
              item.y = canvas.height + 40;
              item.x = Math.random() * canvas.width;
            }
          });

          requestAnimationFrame(draw);
        }

        resize();
        draw();
        window.addEventListener("resize", resize);
      }

      initBackground();
      render();
    </script>
  </body>
</html>
